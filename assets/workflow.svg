<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="380" viewBox="0 0 1400 380">

<defs>

  <!-- Background -->
  <radialGradient id="bg" cx="40%" cy="40%" r="90%">
    <stop offset="0%" stop-color="#0f1722"/>
    <stop offset="100%" stop-color="#070a10"/>
  </radialGradient>

  <!-- Glow -->
  <filter id="glow">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Shadow -->
  <filter id="shadow">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
  </filter>

  <!-- Arrow marker -->
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L0,6 L9,3 z" fill="#7aa2ff"/>
  </marker>

  <style>
    .box {
      fill: #121e2e;
      stroke-width: 2;
      rx: 18;
      filter: url(#shadow);
    }

    .title {
      font: 700 17px Arial;
      fill: #f4f7fb;
    }

    .sub {
      font: 13px Arial;
      fill: #9bb0c7;
    }

    .rail {
      stroke: rgba(255,255,255,0.04);
      stroke-width: 1;
    }

    .flow {
      stroke-width: 4;
      fill: none;
      filter: url(#glow);
    }
  </style>

</defs>

<!-- BACKGROUND -->
<rect width="1400" height="380" fill="url(#bg)"/>

<!-- GRID RAIL -->
<line x1="40" y1="190" x2="1360" y2="190" class="rail"/>

<!-- ================= NODES ================= -->

<!-- Browser Extension -->
<g transform="translate(60 120)">
  <rect width="250" height="140" class="box" stroke="#44d2ff"/>
  <text x="18" y="55" class="title">Browser Extension</text>
  <text x="18" y="85" class="sub">Capture + UI Layer</text>
</g>

<!-- Native Core -->
<g transform="translate(380 120)">
  <rect width="250" height="140" class="box" stroke="#45e0a8"/>
  <text x="18" y="55" class="title">Native Core</text>
  <text x="18" y="85" class="sub">Rust orchestration engine</text>
</g>

<!-- SQLite -->
<g transform="translate(700 120)">
  <rect width="250" height="140" class="box" stroke="#7b8cff"/>
  <text x="18" y="55" class="title">SQLite</text>
  <text x="18" y="85" class="sub">Sessions + metadata</text>
</g>

<!-- DuckDB -->
<g transform="translate(1020 120)">
  <rect width="250" height="140" class="box" stroke="#ff7bb0"/>
  <text x="18" y="55" class="title">DuckDB</text>
  <text x="18" y="85" class="sub">Analytics layer</text>
</g>

<!-- ================= FLOW LINES ================= -->

<!-- Extension → Core -->
<path d="M310 190 L380 190" class="flow" stroke="#44d2ff" marker-end="url(#arrow)"/>

<!-- Core → SQLite -->
<path d="M630 190 L700 190" class="flow" stroke="#45e0a8" marker-end="url(#arrow)"/>

<!-- SQLite → DuckDB -->
<path d="M950 190 L1020 190" class="flow" stroke="#7b8cff" marker-end="url(#arrow)"/>

<!-- Flow nodes -->
<circle cx="345" cy="190" r="3.5" fill="#44d2ff" filter="url(#glow)"/>
<circle cx="665" cy="190" r="3.5" fill="#45e0a8" filter="url(#glow)"/>
<circle cx="985" cy="190" r="3.5" fill="#7b8cff" filter="url(#glow)"/>

<!-- SUBTLE AMBIENT GLOWS -->
<circle cx="250" cy="120" r="90" fill="#44d2ff" opacity="0.05"/>
<circle cx="700" cy="120" r="120" fill="#45e0a8" opacity="0.04"/>
<circle cx="1050" cy="120" r="100" fill="#ff7bb0" opacity="0.04"/>

</svg>