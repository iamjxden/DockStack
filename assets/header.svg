<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520">

<defs>

  <radialGradient id="bg" cx="40%" cy="30%" r="90%">
    <stop offset="0%" stop-color="#0f1722"/>
    <stop offset="100%" stop-color="#070a10"/>
  </radialGradient>

  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#44d2ff"/>
    <stop offset="100%" stop-color="#45e0a8"/>
  </linearGradient>

  <filter id="shadow">
    <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
  </filter>

  <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
    <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#1a2636" stroke-width="0.6"/>
  </pattern>

  <style>
    .title { font: 800 68px Arial; fill: #f4f7fb; }
    .subtitle { font: 400 24px Arial; fill: #9bb0c7; }

    .panel {
      fill: #0f1621;
      stroke: #22344a;
      stroke-width: 1.5;
      filter: url(#shadow);
    }

    .card {
      fill: #0c121b;
      stroke-width: 1.5;
      rx: 16;
      filter: url(#shadow);
    }

    .label { font: 700 16px Arial; fill: #eaf2ff; }
    .text { font: 13px Arial; fill: #8ea5c1; }
  </style>

</defs>

<!-- BACKGROUND -->
<rect width="1600" height="520" fill="url(#bg)"/>
<rect width="1600" height="520" fill="url(#grid)" opacity="0.35"/>

<!-- MAIN PANEL -->
<rect x="70" y="60" width="1460" height="400" rx="28" class="panel"/>

<!-- LEFT CONTENT SAFE ZONE -->
<g transform="translate(130 120)">

  <!-- Title -->
  <text x="0" y="0" class="title">DockStack</text>

  <!-- Subtitle -->
  <text x="0" y="45" class="subtitle">
    DevTools-grade local capture, extraction, storage, and AI-assisted analysis.
  </text>

  <!-- Accent line -->
  <rect x="0" y="70" width="520" height="6" rx="3" fill="url(#accent)"/>

  <!-- ROW 1 CARDS -->
  <g transform="translate(0 110)">

    <rect width="220" height="90" rx="14" class="card" stroke="#44d2ff"/>
    <text x="16" y="35" class="label">Capture</text>
    <text x="16" y="60" class="text">Browser + native hooks</text>

    <g transform="translate(240 0)">
      <rect width="220" height="90" rx="14" class="card" stroke="#45e0a8"/>
      <text x="16" y="35" class="label">Extract</text>
      <text x="16" y="60" class="text">Structured pipelines</text>
    </g>

    <g transform="translate(480 0)">
      <rect width="220" height="90" rx="14" class="card" stroke="#ffd35a"/>
      <text x="16" y="35" class="label">Analyze</text>
      <text x="16" y="60" class="text">Local AI reasoning</text>
    </g>

  </g>

  <!-- ROW 2 CARDS -->
  <g transform="translate(0 220)">

    <rect width="220" height="80" rx="14" class="card" stroke="#7b8cff"/>
    <text x="16" y="35" class="label">Store</text>
    <text x="16" y="58" class="text">SQLite + indexing</text>

    <g transform="translate(240 0)">
      <rect width="220" height="80" rx="14" class="card" stroke="#ff7bb0"/>
      <text x="16" y="35" class="label">Query</text>
      <text x="16" y="58" class="text">DuckDB analytics</text>
    </g>

    <g transform="translate(480 0)">
      <rect width="220" height="80" rx="14" class="card" stroke="#45d2ff"/>
      <text x="16" y="35" class="label">Export</text>
      <text x="16" y="58" class="text">CSV • JSON • bundles</text>
    </g>

  </g>

</g>

<!-- RIGHT DASHBOARD (STRICT FIT) -->
<g transform="translate(1120 110)" filter="url(#shadow)">

  <rect width="350" height="300" rx="20" fill="#0b1017" stroke="#27425f"/>

  <!-- header -->
  <rect x="20" y="20" width="310" height="28" rx="10" fill="#111b28"/>

  <circle cx="40" cy="34" r="4.5" fill="#44d2ff"/>
  <circle cx="58" cy="34" r="4.5" fill="#45e0a8"/>
  <circle cx="76" cy="34" r="4.5" fill="#ffd35a"/>

  <!-- content -->
  <rect x="20" y="80" width="220" height="14" rx="6" fill="#223447"/>
  <rect x="20" y="110" width="280" height="14" rx="6" fill="#1b2a3b"/>
  <rect x="20" y="140" width="240" height="14" rx="6" fill="#1b2a3b"/>

  <!-- highlights -->
  <rect x="20" y="180" width="160" height="12" rx="6" fill="#44d2ff"/>
  <rect x="20" y="205" width="190" height="12" rx="6" fill="#45e0a8"/>
  <rect x="20" y="230" width="140" height="12" rx="6" fill="#ffd35a"/>

  <!-- footer -->
  <rect x="20" y="260" width="310" height="14" rx="7" fill="#1b2a3b"/>

</g>

</svg> 